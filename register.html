<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Register - TimeSyndicate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Prompt',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at bottom,#0a0a0a,#000);
  color:#f5d06f;
}

/* ดาว */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://www.transparenttextures.com/patterns/stardust.png");
  animation:moveStars 80s linear infinite;
  opacity:0.4;
}
@keyframes moveStars{
  from{background-position:0 0;}
  to{background-position:2000px 2000px;}
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  padding:40px 30px;
  border-radius:20px;
  background:rgba(15,15,15,0.85);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,215,0,0.3);
  box-shadow:0 0 40px rgba(255,215,0,0.2);
  text-align:center;
}

/* LOGO */
.logo{
  width:150px;
  margin:0 auto 10px;
}
.logo img{
  width:100%;
  filter: drop-shadow(0 0 10px gold);
}

/* TITLE */
h1{
  font-size:24px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#ffd700,#ffcc00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
.input-group{
  margin-bottom:15px;
  text-align:left;
}
.input-group label{
  font-size:12px;
  color:#ffd700;
}
.input-group input{
  width:100%;
  margin-top:5px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(255,215,0,0.3);
  background:rgba(0,0,0,0.5);
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ffd700,#ffcc00);
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

/* LINK */
.link{
  margin-top:12px;
  font-size:13px;
}
.link a{
  color:#ffd700;
  text-decoration:none;
}

/* MSG */
#msg{
  margin-bottom:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
  <img src="assets/TS01.png" alt="Logo">
</div>

<h1>REGISTER</h1>

<div id="msg"></div>

<!-- 🔥 FORM -->
<form onsubmit="return false;">

<div class="input-group">
  <label>ชื่อ</label>
  <input type="text" id="firstname" required>
</div>

<div class="input-group">
  <label>นามสกุล</label>
  <input type="text" id="lastname" required>
</div>

<div class="input-group">
  <label>Username</label>
  <input type="text" id="username" required>
</div>

<div class="input-group">
  <label>เบอร์ (7 หลัก)</label>
  <input type="text" id="phone" maxlength="7" required>
</div>

<div class="input-group">
  <label>Password</label>
  <input type="password" id="password" required>
</div>

<div class="input-group">
  <label>Confirm Password</label>
  <input type="password" id="confirm" required>
</div>

<!-- 🔥 ปุ่ม -->
<button type="button" onclick="register()">REGISTER</button>

</form>

<div class="link">
  มีบัญชีแล้ว? <a href="index.html">เข้าสู่ระบบ</a>
</div>

</div>

<!-- 🔥 SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/app.js"></script>

</body>
</html>
